<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha0Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Space Grotesk',sans-serif;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.header{padding:20px 28px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.01)}
.logo{display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;border-radius:50%;background:#10b981;box-shadow:0 0 12px #10b98166}
.dot.off{background:#f59e0b;box-shadow:0 0 12px #f59e0b66}
.logo h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo span{font-size:11px;color:rgba(255,255,255,.3);margin-left:10px}
.time{font-size:11px;color:rgba(255,255,255,.3)}
.tabs{padding:0 28px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:0}
.tab{background:none;border:none;color:rgba(255,255,255,.35);font-size:13px;font-weight:400;padding:14px 20px;cursor:pointer;border-bottom:2px solid transparent;font-family:'Space Grotesk',sans-serif;transition:all .2s}
.tab.active{color:#fff;font-weight:600;border-bottom-color:#6366f1}
.tab:hover{color:rgba(255,255,255,.7)}
.content{padding:28px;max-width:1200px}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px 24px;flex:1 1 180px;min-width:170px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.4);margin-bottom:8px}
.stat-val{font-size:36px;font-weight:700;line-height:1}
.stat-sub{font-size:12px;color:rgba(255,255,255,.35);margin-top:6px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.grid{grid-template-columns:1fr}.stats{flex-direction:column}}
.panel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:24px}
.panel-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
.bar-row{margin-bottom:12px}
.bar-header{display:flex;justify-content:space-between;margin-bottom:4px}
.bar-label{font-size:13px;color:rgba(255,255,255,.7)}
.bar-count{font-size:13px;font-weight:600}
.bar-bg{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.company{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:16px}
.company-rank{width:28px;height:28px;border-radius:8px;background:rgba(99,102,241,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#818cf8;flex-shrink:0}
.company-info{flex:1;min-width:0}
.company-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.company-meta{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.company-badge{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;flex-shrink:0}
.signal-row{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 20px;margin-bottom:8px;display:flex;align-items:center;gap:16px}
.signal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.signal-info{flex:1;min-width:0}
.signal-text{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.signal-meta{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.signal-badge{font-size:11px;padding:3px 10px;border-radius:5px;font-weight:600;flex-shrink:0}
.ipo-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:12px}
.ipo-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ipo-score{font-size:28px;font-weight:700;line-height:1}
.ipo-stage{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.ipo-tags{display:flex;gap:4px;flex-wrap:wrap}
.ipo-tag{font-size:10px;padding:3px 8px;border-radius:4px}
.sources-grid{display:flex;gap:20px;flex-wrap:wrap}
.source-card{flex:1 1 200px;background:rgba(255,255,255,.02);border-radius:10px;padding:16px;border:1px solid rgba(255,255,255,.04)}
.source-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.source-val{font-size:28px;font-weight:700}
.source-sub{font-size:11px;color:rgba(255,255,255,.25)}
.footer{padding:16px 28px;border-top:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.2)}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,.3)}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="dot" id="statusDot"></div>
    <div><h1>Alpha0Engine</h1></div>
    <span class="mono">v0.2.1</span>
  </div>
  <div class="time mono" id="clock"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
  <button class="tab" onclick="switchTab('signals',this)">Signals</button>
  <button class="tab" onclick="switchTab('ipo',this)">IPO Tracker</button>
</div>

<div class="content">
  <div id="tab-overview"><div class="loading">Connecting to Alpha0Engine...</div></div>
  <div id="tab-signals" class="hidden"><div class="loading">Loading signals...</div></div>
  <div id="tab-ipo" class="hidden"><div class="loading">Loading IPO candidates...</div></div>
</div>

<div class="footer">
  <span>Alpha0Engine · Asymmetric Return Screening</span>
  <span>All data from free public sources · $0 data cost</span>
</div>

<script>
const API = '';
const typeColors = {github_star:'#f59e0b',github_commit:'#eab308',crossover_filing:'#10b981',form_d:'#3b82f6',sec_13f:'#6366f1',patent_grant:'#ec4899',news_mention:'#8b5cf6'};
const srcColors = {github:'#f59e0b',edgar:'#3b82f6',sec_13f:'#6366f1',nlp_engine:'#8b5cf6',uspto:'#ec4899'};

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['overview','signals','ipo'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== id);
  });
  if (id === 'signals') loadSignals();
  if (id === 'ipo') loadIPO();
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString() + ' · LIVE';
}
setInterval(updateClock, 30000);
updateClock();

async function loadDashboard() {
  try {
    const r = await fetch(API + '/api/v1/dashboard');
    const d = await r.json();
    document.getElementById('statusDot').className = 'dot';
    const s = d.summary || {};
    const types = d.signals_by_type || {};
    const sources = d.signals_by_source || {};
    const companies = d.top_companies || [];
    const maxT = Math.max(...Object.values(types), 1);

    let html = `
      <div class="stats">
        <div class="stat"><div class="stat-label mono">Companies Tracked</div><div class="stat-val">${s.companies_tracked||0}</div><div class="stat-sub mono">${s.private||0} private</div></div>
        <div class="stat"><div class="stat-label mono">Total Signals</div><div class="stat-val" style="color:#6366f1">${(s.total_signals||0).toLocaleString()}</div><div class="stat-sub mono">all time</div></div>
        <div class="stat"><div class="stat-label mono">This Week</div><div class="stat-val" style="color:#10b981">${(s.signals_this_week||0).toLocaleString()}</div><div class="stat-sub mono">new signals</div></div>
        <div class="stat"><div class="stat-label mono">Themes</div><div class="stat-val" style="color:#f59e0b">${s.themes_detected||0}</div><div class="stat-sub mono">emerging clusters</div></div>
      </div>
      <div class="grid">
        <div class="panel"><div class="panel-title mono">Signals by Type</div>
          ${Object.entries(types).sort((a,b)=>b[1]-a[1]).map(([t,c])=>{
            const col = typeColors[t]||'#6366f1';
            return `<div class="bar-row"><div class="bar-header"><span class="bar-label mono">${t.replace(/_/g,' ')}</span><span class="bar-count mono" style="color:${col}">${c.toLocaleString()}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${c/maxT*100}%;background:linear-gradient(90deg,${col},${col}88)"></div></div></div>`;
          }).join('')}
        </div>
        <div class="panel"><div class="panel-title mono">Top Companies by Signal Count</div>
          ${companies.length ? companies.map((c,i)=>`
            <div class="company">
              <div class="company-rank mono">${i+1}</div>
              <div class="company-info"><div class="company-name">${c.name}</div><div class="company-meta mono">${c.type} · ${c.stage||'unclassified'}</div></div>
              <div class="company-badge mono" style="background:rgba(99,102,241,.12);color:#818cf8">${c.signals} signals</div>
            </div>
          `).join('') : '<div style="color:rgba(255,255,255,.2);padding:20px;text-align:center">Collecting data...</div>'}
        </div>
      </div>
      <div class="panel" style="margin-top:24px"><div class="panel-title mono">Data Sources</div>
        <div class="sources-grid">
          ${Object.entries(sources).sort((a,b)=>b[1]-a[1]).map(([src,count])=>{
            const col = srcColors[src]||'#6366f1';
            return `<div class="source-card"><div class="source-label mono" style="color:${col}">${src.replace(/_/g,' ')}</div><div class="source-val">${count.toLocaleString()}</div><div class="source-sub">signals ingested</div></div>`;
          }).join('')}
        </div>
      </div>`;
    document.getElementById('tab-overview').innerHTML = html;
  } catch(e) {
    document.getElementById('statusDot').className = 'dot off';
    document.getElementById('tab-overview').innerHTML = `<div class="loading" style="color:#ef4444">Connection error: ${e.message}</div>`;
  }
}

async function loadSignals() {
  try {
    const r = await fetch(API + '/api/v1/signals?limit=30');
    const data = await r.json();
    let html = '<div class="panel-title mono" style="margin-bottom:16px">Latest Signals</div>';
    (data||[]).forEach(sig => {
      const col = typeColors[sig.signal_type]||'#6366f1';
      html += `<div class="signal-row">
        <div class="signal-dot" style="background:${col}"></div>
        <div class="signal-info"><div class="signal-text">${sig.notes||sig.signal_type?.replace(/_/g,' ')}</div><div class="signal-meta mono">${sig.source} · ${(sig.signal_date||'').substring(0,10)}</div></div>
        <div class="signal-badge mono" style="background:${col}18;color:${col}">${sig.signal_type?.replace(/_/g,' ')}</div>
      </div>`;
    });
    document.getElementById('tab-signals').innerHTML = html;
  } catch(e) {
    document.getElementById('tab-signals').innerHTML = `<div class="loading" style="color:#ef4444">Error: ${e.message}</div>`;
  }
}

async function loadIPO() {
  try {
    const r = await fetch(API + '/api/v1/ipo-candidates?min_score=0.2');
    const data = await r.json();
    let html = '<div class="panel-title mono" style="margin-bottom:8px">IPO Proximity Candidates</div>';
    html += '<div style="font-size:12px;color:rgba(255,255,255,.25);margin-bottom:24px">Companies ranked by probability of IPO within 18 months. Scored from Form D frequency, offering size, crossover fund activity, and patent velocity.</div>';
    if (!data || data.length === 0) {
      html += '<div class="panel" style="text-align:center;color:rgba(255,255,255,.25)">Engine is collecting data. IPO candidates will appear after 24-48 hours of signal ingestion.</div>';
    }
    (data||[]).forEach(c => {
      const rd = c.raw_data?.ipo_proximity||{};
      const score = rd.total||c.value||0;
      const stage = rd.stage_estimate||'unknown';
      const bd = rd.breakdown||{};
      const col = stage==='pre_ipo'?'#10b981':stage==='late_stage'?'#3b82f6':stage==='growth'?'#f59e0b':'#6b7280';
      html += `<div class="ipo-card">
        <div class="ipo-header">
          <div><div style="font-size:16px;font-weight:700">${rd.name||c.notes||'Unknown'}</div><div class="mono" style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">ID: ${(c.entity_id||'').substring(0,12)}...</div></div>
          <div style="text-align:right"><div class="ipo-score" style="color:${col}">${(score*100).toFixed(0)}%</div><div class="ipo-stage mono" style="color:${col}">${stage.replace('_',' ')}</div></div>
        </div>
        <div class="ipo-tags">${Object.entries(bd).map(([k,v])=>`<span class="ipo-tag mono" style="background:${v>.1?'rgba(16,185,129,.1)':'rgba(255,255,255,.03)'};color:${v>.1?'#10b981':'rgba(255,255,255,.3)'}">${k}: ${(v*100).toFixed(0)}%</span>`).join('')}</div>
      </div>`;
    });
    document.getElementById('tab-ipo').innerHTML = html;
  } catch(e) {
    document.getElementById('tab-ipo').innerHTML = `<div class="loading" style="color:#ef4444">Error: ${e.message}</div>`;
  }
}

loadDashboard();
setInterval(loadDashboard, 60000);
</script>
</body>
</html>
