<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha0Engine — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060607;--s1:#0C0C0E;--s2:#111114;
  --b0:rgba(255,255,255,0.055);--b1:rgba(255,255,255,0.11);--b2:rgba(255,255,255,0.2);
  --t0:#F8F8F8;--t1:rgba(248,248,248,0.5);--t2:rgba(248,248,248,0.22);--t3:rgba(248,248,248,0.1);
  --lime:#C8FF00;--pass:#00E87A;--fail:#FF3B3B;--amber:#F5A623;--blue:#4B9EFF;--pink:#FF5FA0;--cyan:#00D4E8;
  --mono:'JetBrains Mono','Cascadia Code','Fira Code',ui-monospace,monospace;
}
html,body{background:var(--bg);color:var(--t0);font-family:var(--mono);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px;}
.scanlines{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.035) 3px,rgba(0,0,0,0.035) 4px);}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--b0);position:sticky;top:0;z-index:100;background:var(--bg);}
.logo{font-size:10px;font-weight:700;letter-spacing:0.22em;color:var(--t2);text-transform:uppercase;}
.logo em{color:var(--lime);font-style:normal;}
.hdr-r{display:flex;align-items:center;gap:18px;}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--pass);box-shadow:0 0 6px var(--pass);flex-shrink:0;animation:syspulse 3s ease-in-out infinite;}
@keyframes syspulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sys-dot.off{background:var(--fail);box-shadow:0 0 6px var(--fail);}
.clock-val{font-size:12px;font-weight:500;letter-spacing:0.06em;}
.clock-lbl{font-size:9px;letter-spacing:0.15em;color:var(--t2);text-transform:uppercase;}
.blink{display:inline-block;width:5px;height:11px;background:var(--lime);margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* NAV */
.nav{display:flex;align-items:center;padding:0 32px;border-bottom:1px solid var(--b0);overflow-x:auto;position:sticky;top:49px;z-index:99;background:var(--bg);}
.nav-btn{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;background:none;border:none;color:var(--t2);padding:12px 18px;cursor:pointer;border-bottom:1.5px solid transparent;transition:all 0.15s;white-space:nowrap;}
.nav-btn:hover{color:var(--t1);}
.nav-btn.active{color:var(--t0);border-bottom-color:var(--lime);}
.nav-btn.hot{color:var(--lime);}
.nav-btn.hot.active{border-bottom-color:var(--lime);}
.nav-ext{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--lime);padding:6px 14px;border:1px solid rgba(200,255,0,0.25);border-radius:2px;text-decoration:none;margin-left:auto;transition:all 0.12s;white-space:nowrap;flex-shrink:0;}
.nav-ext:hover{background:rgba(200,255,0,0.07);border-color:var(--lime);}

/* MAIN */
.main{padding:24px 32px 60px;max-width:1320px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--s1);border:1px solid var(--b0);border-radius:4px;padding:16px 18px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent,var(--b0));}
.stat-lbl{font-size:8.5px;letter-spacing:0.22em;color:var(--t2);text-transform:uppercase;margin-bottom:10px;}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-0.03em;line-height:1;}
.stat-sub{font-size:9px;color:var(--t2);margin-top:5px;font-weight:300;}

/* PANELS */
.panels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.panel{background:var(--s1);border:1px solid var(--b0);border-radius:4px;padding:18px 20px;}
.panel-full{grid-column:1/-1;}
.panel-half{grid-column:span 1;}
.sec-lbl{font-size:8.5px;letter-spacing:0.22em;color:var(--t2);text-transform:uppercase;margin-bottom:14px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--t2);text-align:left;padding:8px 10px;border-bottom:1px solid var(--b1);font-weight:500;}
.tbl td{padding:11px 10px;border-bottom:1px solid var(--b0);font-size:11px;}
.tbl tr:hover td{background:rgba(255,255,255,0.015);}
.tbl .mono{font-family:var(--mono);font-size:11px;}
.tbl .name{font-weight:600;font-size:12px;}
.tbl-wrap{overflow-x:auto;}

/* BADGES */
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:8px;letter-spacing:0.14em;font-weight:700;padding:3px 8px;border-radius:2px;text-transform:uppercase;}
.tier-conviction{background:rgba(0,232,122,0.1);color:var(--pass);border:1px solid rgba(0,232,122,0.18);}
.tier-high{background:rgba(75,158,255,0.1);color:var(--blue);border:1px solid rgba(75,158,255,0.18);}
.tier-watch{background:rgba(245,166,35,0.1);color:var(--amber);border:1px solid rgba(245,166,35,0.18);}
.tier-speculative{background:rgba(255,95,160,0.08);color:var(--pink);border:1px solid rgba(255,95,160,0.14);}
.tier-pass{background:rgba(255,255,255,0.04);color:var(--t2);border:1px solid var(--b0);}
.tier-s{background:rgba(0,232,122,0.1);color:var(--pass);border:1px solid rgba(0,232,122,0.2);}
.tier-a{background:rgba(75,158,255,0.1);color:var(--blue);border:1px solid rgba(75,158,255,0.2);}
.tier-b{background:rgba(245,166,35,0.1);color:var(--amber);border:1px solid rgba(245,166,35,0.18);}
.tier-c{background:rgba(255,255,255,0.05);color:var(--t2);border:1px solid var(--b0);}
.tier-d{background:rgba(255,59,59,0.08);color:var(--fail);border:1px solid rgba(255,59,59,0.14);}
.risk-green{background:rgba(0,232,122,0.1);color:var(--pass);border:1px solid rgba(0,232,122,0.18);}
.risk-yellow{background:rgba(245,166,35,0.1);color:var(--amber);border:1px solid rgba(245,166,35,0.18);}
.risk-orange{background:rgba(255,140,66,0.1);color:#FF8C42;border:1px solid rgba(255,140,66,0.18);}
.risk-red{background:rgba(255,59,59,0.08);color:var(--fail);border:1px solid rgba(255,59,59,0.14);}

/* BARS */
.bar-row{margin-bottom:9px;}
.bar-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.bar-lbl{font-size:10px;color:var(--t1);}
.bar-num{font-size:10px;font-weight:600;}
.bar-track{height:2px;background:var(--b0);border-radius:1px;overflow:hidden;}
.bar-fill{height:100%;border-radius:1px;transition:width 0.8s ease;}

/* TIER COUNTS */
.tier-row{display:flex;gap:16px;flex-wrap:wrap;align-items:baseline;}
.tier-item{text-align:center;}
.tier-num{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:5px;}

/* SIGNALS */
.sig-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--b0);}
.sig-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.sig-text{font-size:11px;font-weight:500;line-height:1.5;}
.sig-meta{font-size:9px;color:var(--t2);margin-top:2px;font-weight:300;}
.sig-tag{font-size:8px;font-weight:700;letter-spacing:0.1em;padding:3px 7px;border-radius:2px;text-transform:uppercase;flex-shrink:0;}

/* FILTER ROW */
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-lbl{font-size:8px;letter-spacing:0.18em;color:var(--t2);text-transform:uppercase;margin-right:4px;}
.filter-btn{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.12em;padding:4px 11px;border:1px solid var(--b0);background:transparent;color:var(--t2);cursor:pointer;border-radius:2px;text-transform:uppercase;transition:all 0.12s;}
.filter-btn:hover{border-color:var(--b2);color:var(--t0);}
.filter-btn.active{background:var(--lime);border-color:var(--lime);color:#000;}

/* PIPELINE */
.pipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.pipe-card{background:var(--s2);border-radius:3px;padding:12px;border-left:2px solid var(--b0);}

/* STATES */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--t2);}
.spinner{width:22px;height:22px;border:2px solid var(--b0);border-top-color:var(--lime);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;}
.empty{text-align:center;padding:40px;font-size:10px;color:var(--t2);letter-spacing:0.1em;text-transform:uppercase;}

/* 1000x DEEP DIVE - reuse screener card style */
.lens-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lens-cards .lcard:last-child{grid-column:1/-1;}
.lcard{background:var(--s2);border:1px solid var(--b0);border-radius:4px;padding:16px 18px;position:relative;overflow:hidden;}
.lcard::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;}
.lcard.lpass::after{background:var(--pass);}.lcard.lfail::after{background:var(--fail);}
.lcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.lid{font-size:8px;letter-spacing:0.2em;color:var(--t2);text-transform:uppercase;margin-bottom:2px;}
.lnm{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
.ldesc{font-size:9px;font-weight:300;font-style:italic;color:var(--t2);line-height:1.6;margin-bottom:10px;}
.lbar-track{width:100%;height:2px;background:var(--b0);border-radius:1px;overflow:hidden;margin-bottom:10px;}
.lbar-fill{height:100%;border-radius:1px;}
.lpass .lbar-fill{background:var(--pass);}.lfail .lbar-fill{background:var(--fail);}
.lscore{font-size:30px;font-weight:700;letter-spacing:-0.03em;line-height:1;}
.lpass .lscore{color:var(--t0);}.lfail .lscore{color:rgba(248,248,248,0.25);}
.lscore-lbl{font-size:7.5px;color:var(--t2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:2px;}
</style>
</head>
<body>
<div class="scanlines"></div>

<header class="hdr">
  <div class="logo">ALPHA<em>0</em>ENGINE <span style="color:var(--b1);margin:0 8px">|</span> <span style="font-size:9px;font-weight:300;color:var(--t2);letter-spacing:0.1em">COMMAND CENTER</span></div>
  <div class="hdr-r">
    <div class="sys-dot" id="sysDot"></div>
    <div>
      <div class="clock-val"><span id="clock">00:00:00</span><span class="blink"></span></div>
      <div class="clock-lbl">UTC Live</div>
    </div>
  </div>
</header>

<nav class="nav">
  <button class="nav-btn active" data-tab="overview">Overview</button>
  <button class="nav-btn" data-tab="screener">Screener</button>
  <button class="nav-btn hot" data-tab="1000x">1000x Screener</button>
  <button class="nav-btn" data-tab="risk">Risk Radar</button>
  <button class="nav-btn" data-tab="signals">Signals</button>
  <button class="nav-btn" data-tab="ipo">IPO Tracker</button>
  <button class="nav-btn hot" data-tab="brain" style="color:var(--cyan)">Brain</button>
  <button class="nav-btn" data-tab="watchlist" style="color:var(--amber)">Watchlist</button>
  <button class="nav-btn" data-tab="catalysts">Catalysts</button>
  <button class="nav-btn" data-tab="deltas">Deltas</button>
  <a class="nav-ext" href="/screener" target="_blank">↗ Full Screener</a>
</nav>

<div class="main">
  <div class="section active" id="sec-overview"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Connecting to engine&hellip;</div></div></div>
  <div class="section" id="sec-screener"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading screener&hellip;</div></div></div>
  <div class="section" id="sec-1000x"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading 1000x data&hellip;</div></div></div>
  <div class="section" id="sec-risk"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading risk radar&hellip;</div></div></div>
  <div class="section" id="sec-signals"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading signals&hellip;</div></div></div>
  <div class="section" id="sec-ipo"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading IPO candidates&hellip;</div></div></div>
  <div class="section" id="sec-brain"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading brain picks&hellip;</div></div></div>
  <div class="section" id="sec-watchlist"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading watchlist&hellip;</div></div></div>
  <div class="section" id="sec-catalysts"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading catalyst calendar&hellip;</div></div></div>
  <div class="section" id="sec-deltas"><div class="loading-state"><div class="spinner"></div><div class="loading-txt">Loading score deltas&hellip;</div></div></div>
</div>

<script>
const API='';
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

// Nav
$$('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    $$('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    $$('.section').forEach(s=>s.classList.remove('active'));
    $(`#sec-${btn.dataset.tab}`).classList.add('active');
    ({screener:loadScreener,'1000x':load1000x,risk:loadRisk,signals:loadSignals,ipo:loadIPO,brain:loadBrain,watchlist:loadWatchlist,catalysts:loadCatalysts,deltas:loadDeltas}[btn.dataset.tab]||function(){})();
  });
});

// Clock
function tick(){$('#clock').textContent=new Date().toISOString().slice(11,19);}
setInterval(tick,1000);tick();

// Helpers
async function api(path){const r=await fetch(API+path);if(!r.ok)throw new Error(r.status);return r.json();}
function num(v){return v!=null?v.toLocaleString():'—';}
function usd(v){if(!v)return'—';if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';return'$'+v.toLocaleString();}
function sc(v){return v!=null?v.toFixed(3):'—';}
function pct(v){return v!=null?(v*100).toFixed(1)+'%':'—';}
function convBadge(t){const m={CONVICTION:'tier-conviction',HIGH:'tier-high',WATCH:'tier-watch',SPECULATIVE:'tier-speculative',PASS:'tier-pass'};return`<span class="badge ${m[t]||'tier-pass'}">${t||'—'}</span>`;}
function tierBadge(t){return`<span class="badge tier-${(t||'').toLowerCase()}">${t||'—'}</span>`;}
function riskBadge(t){return`<span class="badge risk-${(t||'').toLowerCase()}">${t||'—'}</span>`;}
function lensCol(v){if(v>=0.6)return'var(--pass)';if(v>=0.3)return'var(--amber)';return'var(--t2)';}
const TCOLS={'github_star':'#C8FF00','github_commit':'#a8d800','crossover_filing':'#00E87A','form_d':'#4B9EFF','sec_13f':'#7B6FFF','patent_grant':'#FF5FA0','patent_filing':'#ff85b8','news_mention':'#9B7FFF','job_posting':'#00D4E8','secondary_trade':'#FF8C42','citation':'#c4a0ff'};

function statCard(lbl,val,sub,col,accentCol){
  return`<div class="stat" style="--accent:${accentCol||'var(--b0)'}"><div class="stat-lbl">${lbl}</div><div class="stat-val" style="color:${col||'var(--t0)'}">${val}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
async function loadOverview(){
  try{
    const [dash,scrSum,riskSum,kxSum,pipeH]=await Promise.all([
      api('/api/v1/dashboard'),
      api('/api/v1/screener/summary').catch(()=>null),
      api('/api/v1/risk-summary').catch(()=>null),
      api('/api/v1/1000x/summary').catch(()=>null),
      api('/api/v1/pipelines').catch(()=>null),
    ]);
    $('#sysDot').className='sys-dot';
    const s=dash.summary||{};
    const types=dash.signals_by_type||{};
    const sources=dash.signals_by_source||{};
    const companies=dash.top_companies||[];
    const sc2=scrSum||{};const rs=riskSum||{};const kx=kxSum||{};
    const kxT=kx.tier_breakdown||{};const scrT=sc2.tier_breakdown||{};const rsT=rs.tier_breakdown||{};
    const maxT=Math.max(...Object.values(types),1);

    const html=`
    <div class="stats-row">
      ${statCard('Companies',num(s.companies_tracked),`${s.private||0} private · ${s.public||0} public`,'var(--t0)','var(--b2)')}
      ${statCard('Signals',num(s.total_signals),`${num(s.signals_this_week)} this week`,'var(--lime)','var(--lime)')}
      ${statCard('Screened',num(sc2.total_screened),`avg ${sc(sc2.avg_fundamental_score)}`,'var(--pass)','var(--pass)')}
      ${statCard('1000x Watchlist',num(kx.watchlist_count),`${num(kx.total_screened)} screened`,'var(--amber)','var(--amber)')}
      ${statCard('Risk Alerts',num((rs.hype_flagged||0)+(rs.illiquidity_flagged||0)),`${rs.hype_flagged||0} hype · ${rs.illiquidity_flagged||0} illiquid`,'var(--fail)','var(--fail)')}
    </div>

    <div class="panels">
      <div class="panel">
        <div class="sec-lbl">Screening Tiers</div>
        <div class="tier-row">
          ${['S','A','B','C','D'].map(t=>`<div class="tier-item"><div class="tier-num">${scrT[t]||0}</div>${tierBadge(t)}</div>`).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="sec-lbl">1000x Conviction Tiers</div>
        <div class="tier-row">
          ${['CONVICTION','HIGH','WATCH','SPECULATIVE','PASS'].map(t=>`<div class="tier-item"><div class="tier-num" style="font-size:20px">${kxT[t]||0}</div>${convBadge(t)}</div>`).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="sec-lbl">Risk Distribution</div>
        <div class="tier-row">
          ${['GREEN','YELLOW','ORANGE','RED'].map(t=>`<div class="tier-item"><div class="tier-num">${rsT[t]||0}</div>${riskBadge(t)}</div>`).join('')}
        </div>
      </div>
    </div>

    ${kx.top_picks&&kx.top_picks.length?`
    <div class="panel panel-full" style="margin-bottom:20px">
      <div class="sec-lbl" style="color:var(--lime)">★ 1000x Top Picks</div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Ticker</th><th>Company</th><th>Tier</th><th>Score</th><th>Lenses</th><th>Top Lens</th><th>Notes</th></tr></thead>
        <tbody>${kx.top_picks.map(p=>`<tr>
          <td class="mono" style="font-weight:700;color:var(--lime)">${p.ticker||'—'}</td>
          <td class="name">${p.company_name||'—'}</td>
          <td>${convBadge(p.conviction_tier)}</td>
          <td class="mono" style="font-weight:700">${sc(p.composite_score)}</td>
          <td class="mono">${p.active_lenses}/5</td>
          <td style="font-size:10px">${p.top_lens||'—'}</td>
          <td style="font-size:10px;color:var(--t2);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.screening_notes||''}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}

    <div class="panels">
      <div class="panel">
        <div class="sec-lbl">Signals by Type</div>
        ${Object.entries(types).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([t,c])=>{
          const col=TCOLS[t]||'var(--lime)';
          return`<div class="bar-row"><div class="bar-head"><span class="bar-lbl">${t.replace(/_/g,' ')}</span><span class="bar-num" style="color:${col}">${num(c)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${c/maxT*100}%;background:${col}"></div></div></div>`;
        }).join('')}
      </div>
      <div class="panel">
        <div class="sec-lbl">Top Companies by Signal</div>
        ${companies.slice(0,8).map((c,i)=>`
          <div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--b0);gap:10px">
            <div style="width:20px;text-align:center;font-size:9px;font-weight:700;color:var(--t2)">${String(i+1).padStart(2,'0')}</div>
            <div style="flex:1;min-width:0">

async function addToWatchlist(){
  const ticker=$('#wl-ticker').value.trim().toUpperCase();
  if(!ticker)return;
  const priority=$('#wl-pri').value;
  try{
    await fetch(API+'/api/v1/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker,priority})});
    $('#wl-ticker').value='';
    await loadWatchlist();
  }catch(e){alert('Failed: '+e.message);}
}

async function removeFromWatchlist(id){
  try{await fetch(API+'/api/v1/watchlist/'+id,{method:'DELETE'});await loadWatchlist();}catch(e){alert('Failed: '+e.message);}
}

function openDeepDive(ticker){
  $$('.nav-btn').forEach(b=>b.classList.remove('active'));
  const kxBtn=[...$$('.nav-btn')].find(b=>b.dataset.tab==='1000x');
  if(kxBtn)kxBtn.classList.add('active');
  $$('.section').forEach(s=>s.classList.remove('active'));
  $('#sec-1000x').classList.add('active');
  kxTicker=ticker;load1000x();
}

async function pinCatalyst(){
  const ticker=$('#cat-pin-ticker').value.trim().toUpperCase();
  const title=$('#cat-pin-title').value.trim();
  if(!ticker||!title)return;
  const body={ticker,catalyst_type:$('#cat-pin-type').value,title,status:'upcoming'};
  const dateVal=$('#cat-pin-date').value;
  if(dateVal)body.expected_date=dateVal;
  try{
    await fetch(API+'/api/v1/catalysts/pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    $('#cat-pin-ticker').value='';$('#cat-pin-title').value='';$('#cat-pin-date').value='';
    await loadCatalysts();
  }catch(e){alert('Failed: '+e.message);}
}

// ── BRAIN (AI Picks) ─────────────────────────────────────────────────────────
let brainDays=30,brainConv='',brainStatus='active',brainPick=null;
function brainConvBadge(c){
  const m={HIGH:'tier-conviction',MEDIUM:'tier-high',LOW:'tier-watch',NONE:'tier-pass'};
  return`<span class="badge ${m[c]||'tier-pass'}">${c||'—'}</span>`;
}
function brainNarrConvBadge(c){
  const m={STRONG_BUY:'tier-conviction',BUY:'tier-high',HOLD:'tier-watch',CAUTIOUS:'tier-speculative',AVOID:'tier-pass'};
  return`<span class="badge ${m[c]||'tier-pass'}">${c||'—'}</span>`;
}
function confBar(v){
  const pct=Math.round((v||0)*100);
  const col=pct>=70?'var(--pass)':pct>=40?'var(--amber)':'var(--t2)';
  return`<div style="display:flex;align-items:center;gap:6px"><div style="width:50px;height:3px;background:var(--b0);border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${col};border-radius:2px"></div></div><span class="mono" style="font-size:10px;color:${col}">${pct}%</span></div>`;
}

function retBadge(v){
  if(v==null) return'<span class="mono" style="color:var(--t2)">—</span>';
  const col=v>=100?'var(--lime)':v>0?'var(--pass)':v>-20?'var(--amber)':'var(--fail)';
  return`<span class="mono" style="font-weight:700;color:${col}">${v>0?'+':''}${v.toFixed(1)}%</span>`;
}
function statusBadge(s){
  const m={active:['var(--cyan)','var(--cyan)'],hit:['var(--pass)','var(--pass)'],miss:['var(--fail)','var(--fail)'],expired:['var(--t2)','var(--b1)']};
  const[c,bg]=m[s]||['var(--t2)','var(--b1)'];
  return`<span style="font-size:9px;font-weight:700;color:${c};border:1px solid ${bg};padding:2px 6px;border-radius:2px;letter-spacing:0.1em">${(s||'—').toUpperCase()}</span>`;
}

          <td>${confBar(p.confidence_score)}</td>
          <td class="mono" style="font-size:10px">${p.price_at_pick?'$'+p.price_at_pick.toFixed(2):'—'}</td>
          <td class="mono" style="font-size:10px">${p.price_latest?'$'+p.price_latest.toFixed(2):'—'}</td>
          <td>${retBadge(p.return_pct)}</td>
          <td class="mono">${p.signal_count||0}</td>
          <td class="mono" style="font-weight:700;color:${p.return_multiple>=10?'var(--lime)':p.return_multiple>=5?'var(--pass)':'var(--t1)'}">${p.return_multiple?p.return_multiple+'x':'—'}</td>
          <td style="font-size:10px;color:var(--t2)">${(p.generated_at||'').substring(0,10)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`:`
      <div class="empty" style="padding:60px">
        <div style="font-size:28px;margin-bottom:12px;color:var(--cyan)">&#9670;</div>
        <div style="margin-bottom:6px">No picks yet</div>
        <div style="font-size:9px;color:var(--t2);letter-spacing:0.08em">The Brain runs daily at 06:00 UTC. High-conviction picks appear here when they pass the threshold gate (3+ signals, 2+ lenses, 2+ sources).</div>
      </div>`}
    </div>`;

    $('#sec-brain').innerHTML=html;
    gsap.fromTo('#sec-brain .stat,#sec-brain .panel',{opacity:0,y:10},{opacity:1,y:0,duration:0.35,stagger:0.04,ease:'power2.out'});
  }catch(e){$('#sec-brain').innerHTML=`<div class="loading-state" style="color:var(--fail)">Error: ${e.message}</div>`;}
}

loadOverview();
setInterval(loadOverview,120000);
</script>
</body>
</html>
