<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha0Engine — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090d; --surface: #0f1117; --surface2: #151820;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
  --text: #e8eaed; --text2: rgba(255,255,255,0.5); --text3: rgba(255,255,255,0.25);
  --accent: #635bff; --accent2: #8b83ff;
  --green: #00d68f; --green-bg: rgba(0,214,143,0.08);
  --red: #ff5a5a; --red-bg: rgba(255,90,90,0.08);
  --yellow: #ffb224; --yellow-bg: rgba(255,178,36,0.08);
  --orange: #ff8c42; --orange-bg: rgba(255,140,66,0.08);
  --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.08);
  --pink: #ec4899;
  --cyan: #06b6d4; --cyan-bg: rgba(6,182,212,0.08);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:3px; }

.header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; backdrop-filter:blur(20px); }
.logo-group { display:flex; align-items:center; gap:12px; }
.pulse { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.pulse.off { background:var(--red); box-shadow:0 0 8px var(--red); }
.logo { font-size:17px; font-weight:700; letter-spacing:-.4px; }
.logo span { color:var(--accent); }
.version { font-family:var(--mono); font-size:10px; color:var(--text3); background:rgba(255,255,255,.04); padding:3px 8px; border-radius:4px; }
.clock { font-family:var(--mono); font-size:11px; color:var(--text3); }

.nav { display:flex; gap:0; padding:0 24px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:53px; z-index:99; overflow-x:auto; }
.nav-btn { background:none; border:none; color:var(--text2); font-family:var(--sans); font-size:13px; font-weight:500; padding:12px 18px; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; }
.nav-btn:hover { color:var(--text); }
.nav-btn.active { color:#fff; border-bottom-color:var(--accent); }
.nav-btn.hot { color:var(--yellow); }
.nav-btn.hot.active { border-bottom-color:var(--yellow); }

.main { padding:20px 24px 40px; max-width:1320px; margin:0 auto; }
.section { display:none; } .section.active { display:block; }
.grid-5 { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:900px) { .grid-5,.grid-4,.grid-3 { grid-template-columns:repeat(2,1fr); } .grid-2 { grid-template-columns:1fr; } }
@media(max-width:600px) { .grid-5,.grid-4 { grid-template-columns:1fr 1fr; } }

.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px 20px; }
.card-sm { padding:14px 16px; }
.card-title { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); margin-bottom:12px; }
.big-num { font-size:32px; font-weight:700; line-height:1; letter-spacing:-1px; }
.big-sub { font-family:var(--mono); font-size:11px; color:var(--text3); margin-top:6px; }

.tier { display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:22px; border-radius:5px; font-family:var(--mono); font-size:11px; font-weight:700; padding:0 6px; }
.tier-S { background:rgba(0,214,143,.12); color:var(--green); }
.tier-A { background:rgba(59,130,246,.12); color:var(--blue); }
.tier-B { background:rgba(255,178,36,.12); color:var(--yellow); }
.tier-C { background:rgba(255,255,255,.06); color:var(--text2); }
.tier-D { background:var(--red-bg); color:var(--red); }
.risk-GREEN { background:var(--green-bg); color:var(--green); }
.risk-YELLOW { background:var(--yellow-bg); color:var(--yellow); }
.risk-ORANGE { background:var(--orange-bg); color:var(--orange); }
.risk-RED { background:var(--red-bg); color:var(--red); }
.conv-CONVICTION { background:rgba(0,214,143,.15); color:var(--green); border:1px solid rgba(0,214,143,.25); }
.conv-HIGH { background:rgba(59,130,246,.12); color:var(--blue); }
.conv-WATCH { background:rgba(255,178,36,.12); color:var(--yellow); }
.conv-SPECULATIVE { background:rgba(255,140,66,.12); color:var(--orange); }
.conv-PASS { background:rgba(255,255,255,.04); color:var(--text3); }

.table { width:100%; border-collapse:collapse; }
.table th { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text3); text-align:left; padding:10px 12px; border-bottom:1px solid var(--border2); font-weight:500; }
.table td { padding:12px; border-bottom:1px solid var(--border); font-size:13px; }
.table tr:hover td { background:rgba(255,255,255,.02); }
.table .mono { font-family:var(--mono); font-size:12px; }
.table .name { font-weight:600; }

.sig-row { display:flex; align-items:center; gap:12px; padding:10px 14px; border-bottom:1px solid var(--border); }
.sig-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sig-info { flex:1; min-width:0; }
.sig-text { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sig-meta { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:2px; }
.sig-badge { font-family:var(--mono); font-size:10px; padding:3px 8px; border-radius:4px; font-weight:600; flex-shrink:0; }

.bar-row { margin-bottom:10px; }
.bar-head { display:flex; justify-content:space-between; margin-bottom:3px; }
.bar-label { font-size:12px; color:var(--text2); }
.bar-val { font-family:var(--mono); font-size:12px; font-weight:600; }
.bar-track { height:5px; background:rgba(255,255,255,.04); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width .8s ease; }

.lens-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:16px; }
.lens-pill { text-align:center; padding:10px 6px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); }
.lens-pill .lens-name { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:4px; }
.lens-pill .lens-val { font-family:var(--mono); font-size:16px; font-weight:700; }
@media(max-width:700px) { .lens-grid { grid-template-columns:repeat(3,1fr); } }

.loading { text-align:center; padding:60px 20px; color:var(--text3); }
.spinner { width:24px; height:24px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:40px; color:var(--text3); font-size:13px; }

.filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filter-btn { background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--text2); font-family:var(--sans); font-size:12px; padding:6px 14px; border-radius:6px; cursor:pointer; transition:all .15s; }
.filter-btn:hover { border-color:var(--border2); color:var(--text); }
.filter-btn.active { background:rgba(99,91,255,.12); border-color:rgba(99,91,255,.3); color:var(--accent2); }
.filter-label { font-family:var(--mono); font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-right:4px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-group">
    <div class="pulse" id="statusDot"></div>
    <div class="logo">Alpha0<span>Engine</span></div>
    <div class="version">v0.5.0</div>
  </div>
  <div class="clock" id="clock"></div>
</div>

<div class="nav">
  <button class="nav-btn active" data-tab="overview">Overview</button>
  <button class="nav-btn" data-tab="screener">Screener</button>
  <button class="nav-btn hot" data-tab="1000x">1000x Screener</button>
  <button class="nav-btn" data-tab="risk">Risk Radar</button>
  <button class="nav-btn" data-tab="signals">Signals</button>
  <button class="nav-btn" data-tab="ipo">IPO Tracker</button>
</div>

<div class="main">
  <div class="section active" id="sec-overview"><div class="loading"><div class="spinner"></div>Connecting to engine...</div></div>
  <div class="section" id="sec-screener"><div class="loading"><div class="spinner"></div>Loading screener...</div></div>
  <div class="section" id="sec-1000x"><div class="loading"><div class="spinner"></div>Loading 1000x screener...</div></div>
  <div class="section" id="sec-risk"><div class="loading"><div class="spinner"></div>Loading risk data...</div></div>
  <div class="section" id="sec-signals"><div class="loading"><div class="spinner"></div>Loading signals...</div></div>
  <div class="section" id="sec-ipo"><div class="loading"><div class="spinner"></div>Loading IPO candidates...</div></div>
</div>

<script>
const API = '';
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $$('.section').forEach(s => s.classList.remove('active'));
    $(`#sec-${btn.dataset.tab}`).classList.add('active');
    const loaders = { screener: loadScreener, '1000x': load1000x, risk: loadRisk, signals: loadSignals, ipo: loadIPO };
    if (loaders[btn.dataset.tab]) loaders[btn.dataset.tab]();
  });
});

function tick() { $('#clock').textContent = new Date().toLocaleString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) + ' UTC'; }
setInterval(tick, 1000); tick();

function tierBadge(t) { return `<span class="tier tier-${t}">${t}</span>`; }
function riskBadge(t) { return `<span class="tier risk-${t}">${t}</span>`; }
function convBadge(t) { return `<span class="tier conv-${t}">${t}</span>`; }
function pct(v) { return v != null ? (v*100).toFixed(1)+'%' : '\u2014'; }
function num(v) { return v != null ? v.toLocaleString() : '\u2014'; }
function usd(v) { if(!v) return '\u2014'; if(v>=1e9) return '$'+(v/1e9).toFixed(1)+'B'; if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(v>=1e3) return '$'+(v/1e3).toFixed(0)+'K'; return '$'+v.toLocaleString(); }
function score(v) { return v != null ? v.toFixed(3) : '\u2014'; }
function lensColor(v) { if(v>=0.6) return 'var(--green)'; if(v>=0.3) return 'var(--yellow)'; return 'var(--text3)'; }
const typeColors = {github_star:'#ffb224',github_commit:'#eab308',crossover_filing:'#00d68f',form_d:'#3b82f6',sec_13f:'#635bff',patent_grant:'#ec4899',patent_filing:'#f472b6',news_mention:'#8b5cf6',job_posting:'#06b6d4',secondary_trade:'#f97316',citation:'#a78bfa'};
const lensNames = ['Catalyst','Earnings','Demand','Float','Smart $'];

async function api(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ═══════════════════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════════════════
async function loadOverview() {
  try {
    const [dash, screenSum, riskSum, kxSum] = await Promise.all([
      api('/api/v1/dashboard'),
      api('/api/v1/screener/summary').catch(() => null),
      api('/api/v1/risk-summary').catch(() => null),
      api('/api/v1/1000x/summary').catch(() => null),
    ]);
    $('#statusDot').className = 'pulse';
    const s = dash.summary || {};
    const types = dash.signals_by_type || {};
    const sources = dash.signals_by_source || {};
    const companies = dash.top_companies || [];
    const sc = screenSum || {};
    const rs = riskSum || {};
    const kx = kxSum || {};
    const tiers = sc.tier_breakdown || {};
    const riskTiers = rs.tier_breakdown || {};
    const kxTiers = kx.tier_breakdown || {};
    const maxT = Math.max(...Object.values(types), 1);

    let html = `
      <div class="grid-5">
        <div class="card card-sm"><div class="card-title">Companies</div><div class="big-num">${s.companies_tracked||0}</div><div class="big-sub">${s.private||0} private &middot; ${s.public||0} public</div></div>
        <div class="card card-sm"><div class="card-title">Signals</div><div class="big-num" style="color:var(--accent)">${num(s.total_signals)}</div><div class="big-sub">${num(s.signals_this_week)} this week</div></div>
        <div class="card card-sm"><div class="card-title">Screened</div><div class="big-num" style="color:var(--green)">${sc.total_screened||0}</div><div class="big-sub">avg ${score(sc.avg_fundamental_score)}</div></div>
        <div class="card card-sm"><div class="card-title">1000x Watchlist</div><div class="big-num" style="color:var(--yellow)">${kx.watchlist_count||0}</div><div class="big-sub">${kx.total_screened||0} screened</div></div>
        <div class="card card-sm"><div class="card-title">Risk Alerts</div><div class="big-num" style="color:${(rs.hype_flagged||0)+(rs.illiquidity_flagged||0)>0?'var(--red)':'var(--green)'}">${(rs.hype_flagged||0)+(rs.illiquidity_flagged||0)}</div><div class="big-sub">${rs.hype_flagged||0} hype &middot; ${rs.illiquidity_flagged||0} illiquid</div></div>
      </div>

      <div class="grid-3" style="margin-bottom:24px">
        <div class="card">
          <div class="card-title">Screening Tiers</div>
          <div style="display:flex;gap:16px;flex-wrap:wrap">
            ${['S','A','B','C','D'].map(t => `<div style="text-align:center"><div style="font-size:24px;font-weight:700;margin-bottom:4px">${tiers[t]||0}</div>${tierBadge(t)}</div>`).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-title">1000x Conviction Tiers</div>
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            ${['CONVICTION','HIGH','WATCH','SPECULATIVE','PASS'].map(t => `<div style="text-align:center"><div style="font-size:20px;font-weight:700;margin-bottom:4px">${kxTiers[t]||0}</div>${convBadge(t)}</div>`).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Risk Distribution</div>
          <div style="display:flex;gap:16px;flex-wrap:wrap">
            ${['GREEN','YELLOW','ORANGE','RED'].map(t => `<div style="text-align:center"><div style="font-size:24px;font-weight:700;margin-bottom:4px">${riskTiers[t]||0}</div>${riskBadge(t)}</div>`).join('')}
          </div>
        </div>
      </div>

      ${kx.top_picks && kx.top_picks.length ? `
      <div class="card" style="margin-bottom:24px">
        <div class="card-title" style="color:var(--yellow)">&#9733; 1000x Top Picks</div>
        <table class="table"><thead><tr><th>Ticker</th><th>Company</th><th>Conviction</th><th>Score</th><th>Lenses</th><th>Top Lens</th><th>Notes</th></tr></thead><tbody>
        ${kx.top_picks.map(p => `<tr>
          <td class="mono" style="font-weight:700;color:var(--yellow)">${p.ticker||'\u2014'}</td>
          <td class="name">${p.company_name||'\u2014'}</td>
          <td>${convBadge(p.conviction_tier)}</td>
          <td class="mono" style="font-weight:700">${score(p.composite_score)}</td>
          <td class="mono">${p.active_lenses}/5</td>
          <td style="font-size:11px">${p.top_lens||'\u2014'}</td>
          <td style="font-size:11px;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.screening_notes||''}</td>
        </tr>`).join('')}
        </tbody></table>
      </div>` : ''}

      <div class="grid-2">
        <div class="card">
          <div class="card-title">Signals by Type</div>
          ${Object.entries(types).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([t,c])=>{
            const col = typeColors[t]||'var(--accent)';
            return `<div class="bar-row"><div class="bar-head"><span class="bar-label">${t.replace(/_/g,' ')}</span><span class="bar-val" style="color:${col}">${num(c)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${c/maxT*100}%;background:${col}"></div></div></div>`;
          }).join('')}
        </div>
        <div class="card">
          <div class="card-title">Top Companies</div>
          ${companies.length ? companies.slice(0,8).map((c,i) => `
            <div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:10px">
              <div style="width:22px;height:22px;border-radius:6px;background:rgba(99,91,255,.1);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent2)">${i+1}</div>
              <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3)">${c.type||''} &middot; ${c.stage||''}</div></div>
              <div style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)">${c.signals}</div>
            </div>
          `).join('') : '<div class="empty">Collecting data...</div>'}
        </div>
      </div>

      <div class="card" style="margin-top:24px">
        <div class="card-title">Data Sources</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          ${Object.entries(sources).sort((a,b)=>b[1]-a[1]).map(([src,count])=>`
            <div style="flex:1 1 140px;background:var(--surface2);border-radius:8px;padding:14px">
              <div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px">${src.replace(/_/g,' ')}</div>
              <div style="font-size:22px;font-weight:700">${num(count)}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
    $('#sec-overview').innerHTML = html;
  } catch(e) {
    $('#statusDot').className = 'pulse off';
    $('#sec-overview').innerHTML = `<div class="loading" style="color:var(--red)">Connection failed: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════
// SCREENER (Module 3)
// ═══════════════════════════════════════════════════
let screenFilter = '';
async function loadScreener() {
  try {
    const url = screenFilter ? `/api/v1/screener?tiers=${screenFilter}&limit=100` : '/api/v1/screener?limit=100';
    const data = await api(url);
    let html = `
      <div class="filters">
        <span class="filter-label">Tier</span>
        <button class="filter-btn ${screenFilter===''?'active':''}" onclick="screenFilter='';loadScreener()">All</button>
        ${['S','A','B','C','D'].map(t => `<button class="filter-btn ${screenFilter===t?'active':''}" onclick="screenFilter='${t}';loadScreener()">${t}</button>`).join('')}
      </div>
      <div class="card" style="overflow-x:auto">
        <table class="table">
          <thead><tr>
            <th>Company</th><th>Type</th><th>Tier</th><th>Score</th><th>Moat</th>
            <th>Patent</th><th>Talent</th><th>GitHub</th>
            <th>Gross Margin</th><th>Rev Growth</th><th>Runway</th>
          </tr></thead>
          <tbody>
            ${(data||[]).map(r => `<tr>
              <td class="name">${r.company_name||'\u2014'}</td>
              <td class="mono" style="font-size:11px;color:var(--text2)">${r.entity_type||''}</td>
              <td>${tierBadge(r.screening_tier)}</td>
              <td class="mono" style="font-weight:600">${score(r.fundamental_score)}</td>
              <td class="mono">${score(r.moat_score)}</td>
              <td class="mono">${score(r.patent_strength)}</td>
              <td class="mono">${score(r.talent_density)}</td>
              <td class="mono">${score(r.github_momentum)}</td>
              <td class="mono">${pct(r.gross_margin)}</td>
              <td class="mono">${pct(r.revenue_growth_yoy)}</td>
              <td class="mono">${r.cash_runway_months ? r.cash_runway_months.toFixed(0)+'mo' : r.estimated_runway_months ? r.estimated_runway_months.toFixed(0)+'mo' : '\u2014'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    if (!data || data.length === 0) html += '<div class="empty">No screened companies yet. The screener runs daily.</div>';
    $('#sec-screener').innerHTML = html;
  } catch(e) { $('#sec-screener').innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`; }
}

// ═══════════════════════════════════════════════════
// 1000x SCREENER (Module 5)
// ═══════════════════════════════════════════════════
let kxFilter = '';
let kxView = 'all'; // 'all' or 'watchlist'
async function load1000x() {
  try {
    const [summary, data] = await Promise.all([
      api('/api/v1/1000x/summary').catch(()=>({})),
      kxView === 'watchlist'
        ? api('/api/v1/1000x/watchlist?limit=50')
        : api(kxFilter ? `/api/v1/1000x?tier=${kxFilter}&limit=100` : '/api/v1/1000x?limit=100'),
    ]);
    const sm = summary || {};
    const tiers = sm.tier_breakdown || {};
    const lensDist = sm.lens_distribution || {};
    const maxLens = Math.max(...Object.values(lensDist), 1);

    let html = `
      <div class="grid-4" style="margin-bottom:20px">
        <div class="card card-sm"><div class="card-title">Screened</div><div class="big-num">${sm.total_screened||0}</div><div class="big-sub">avg score ${score(sm.avg_composite_score)}</div></div>
        <div class="card card-sm"><div class="card-title">Watchlist</div><div class="big-num" style="color:var(--yellow)">${sm.watchlist_count||0}</div><div class="big-sub">CONVICTION + HIGH</div></div>
        <div class="card card-sm"><div class="card-title">Conviction</div><div class="big-num" style="color:var(--green)">${tiers.CONVICTION||0}</div><div class="big-sub">highest tier</div></div>
        <div class="card card-sm"><div class="card-title">High</div><div class="big-num" style="color:var(--blue)">${tiers.HIGH||0}</div><div class="big-sub">deep dive candidates</div></div>
      </div>

      <div class="grid-2" style="margin-bottom:20px">
        <div class="card">
          <div class="card-title">Conviction Tiers</div>
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            ${['CONVICTION','HIGH','WATCH','SPECULATIVE','PASS'].map(t => `<div style="text-align:center"><div style="font-size:22px;font-weight:700;margin-bottom:4px">${tiers[t]||0}</div>${convBadge(t)}</div>`).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Top Lens Distribution</div>
          ${Object.entries(lensDist).sort((a,b)=>b[1]-a[1]).map(([l,c])=>{
            const cols = {'Binary Catalyst':'var(--red)','Earnings Inflection':'var(--green)','Demand Rider':'var(--cyan)','Float Mechanics':'var(--orange)','Smart Money':'var(--accent)'};
            const col = cols[l]||'var(--accent)';
            return `<div class="bar-row"><div class="bar-head"><span class="bar-label">${l}</span><span class="bar-val" style="color:${col}">${c}</span></div><div class="bar-track"><div class="bar-fill" style="width:${c/maxLens*100}%;background:${col}"></div></div></div>`;
          }).join('')}
        </div>
      </div>

      <div class="filters">
        <span class="filter-label">View</span>
        <button class="filter-btn ${kxView==='all'?'active':''}" onclick="kxView='all';kxFilter='';load1000x()">All</button>
        <button class="filter-btn ${kxView==='watchlist'?'active':''}" onclick="kxView='watchlist';load1000x()">&#9733; Watchlist</button>
        <span style="width:16px"></span>
        <span class="filter-label">Tier</span>
        ${['CONVICTION','HIGH','WATCH','SPECULATIVE','PASS'].map(t => `<button class="filter-btn ${kxFilter===t?'active':''}" onclick="kxFilter='${t}';kxView='all';load1000x()">${t}</button>`).join('')}
        <button class="filter-btn ${kxFilter===''&&kxView==='all'?'active':''}" onclick="kxFilter='';kxView='all';load1000x()">All</button>
      </div>

      <div class="card" style="overflow-x:auto">
        <table class="table">
          <thead><tr>
            <th>Ticker</th><th>Company</th><th>Tier</th><th>Score</th><th>Lenses</th>
            <th>Catalyst</th><th>Earnings</th><th>Demand</th><th>Float</th><th>Smart $</th>
            <th>Mkt Cap</th><th>Top Lens</th><th>Notes</th>
          </tr></thead>
          <tbody>
            ${(data||[]).map(r => {
              const cs = r.catalyst_score||0, es = r.earnings_score||0, ds = r.demand_score||0, fs = r.float_score||0, ss = r.smart_money_score||0;
              return `<tr>
                <td class="mono" style="font-weight:700;color:var(--yellow)">${r.ticker||'\u2014'}</td>
                <td class="name">${r.company_name||'\u2014'}</td>
                <td>${convBadge(r.conviction_tier)}</td>
                <td class="mono" style="font-weight:700">${score(r.composite_score)}</td>
                <td class="mono">${r.active_lenses}/5</td>
                <td class="mono" style="color:${lensColor(cs)}">${score(cs)}</td>
                <td class="mono" style="color:${lensColor(es)}">${score(es)}</td>
                <td class="mono" style="color:${lensColor(ds)}">${score(ds)}</td>
                <td class="mono" style="color:${lensColor(fs)}">${score(fs)}</td>
                <td class="mono" style="color:${lensColor(ss)}">${score(ss)}</td>
                <td class="mono">${usd(r.market_cap_usd)}</td>
                <td style="font-size:11px">${r.top_lens||'\u2014'}</td>
                <td style="font-size:11px;color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.screening_notes||''}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    if (!data || data.length === 0) html += '<div class="empty">No 1000x screens yet. The screener runs daily on all public entities.</div>';
    $('#sec-1000x').innerHTML = html;
  } catch(e) { $('#sec-1000x').innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`; }
}

// ═══════════════════════════════════════════════════
// RISK RADAR
// ═══════════════════════════════════════════════════
async function loadRisk() {
  try {
    const [alerts, summary] = await Promise.all([
      api('/api/v1/risk-alerts?min_risk=0.0&limit=50'),
      api('/api/v1/risk-summary'),
    ]);
    let html = `
      <div class="grid-4" style="margin-bottom:20px">
        <div class="card card-sm"><div class="card-title">Assessed</div><div class="big-num">${summary.total_assessed||0}</div></div>
        <div class="card card-sm"><div class="card-title">Avg Risk</div><div class="big-num" style="color:${(summary.avg_risk_score||0)>.5?'var(--red)':'var(--green)'}">${score(summary.avg_risk_score)}</div></div>
        <div class="card card-sm"><div class="card-title">Hype Flagged</div><div class="big-num" style="color:var(--yellow)">${summary.hype_flagged||0}</div></div>
        <div class="card card-sm"><div class="card-title">Illiquid Flagged</div><div class="big-num" style="color:var(--orange)">${summary.illiquidity_flagged||0}</div></div>
      </div>
      <div class="card" style="overflow-x:auto">
        <div class="card-title">All Risk Assessments</div>
        <table class="table">
          <thead><tr>
            <th>Company</th><th>Type</th><th>Risk</th><th>Score</th>
            <th>Hype Gap</th><th>Illiquidity</th><th>Flags</th><th>Notes</th>
          </tr></thead>
          <tbody>
            ${(alerts||[]).map(r => {
              const flags = r.risk_flags || {};
              const flagList = Object.values(flags).flat().join(', ');
              return `<tr>
                <td class="name">${r.company_name||'\u2014'}</td>
                <td class="mono" style="font-size:11px;color:var(--text2)">${r.entity_type||''}</td>
                <td>${riskBadge(r.risk_tier)}</td>
                <td class="mono" style="font-weight:600">${score(r.risk_score)}</td>
                <td class="mono" style="color:${r.hype_gap>0.3?'var(--red)':r.hype_gap>0?'var(--yellow)':'var(--green)'}">${score(r.hype_gap)}</td>
                <td class="mono" style="color:${r.illiquidity_score>0.6?'var(--red)':r.illiquidity_score>0.3?'var(--yellow)':'var(--green)'}">${score(r.illiquidity_score)}</td>
                <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${flagList||'\u2014'}</td>
                <td style="font-size:11px;color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.risk_notes||''}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    if (!alerts || alerts.length === 0) html += '<div class="empty">No risk assessments yet. The risk filter runs daily.</div>';
    $('#sec-risk').innerHTML = html;
  } catch(e) { $('#sec-risk').innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`; }
}

// ═══════════════════════════════════════════════════
// SIGNALS
// ═══════════════════════════════════════════════════
async function loadSignals() {
  try {
    const data = await api('/api/v1/signals?limit=50');
    let html = '<div class="card">';
    (data||[]).forEach(s => {
      const col = typeColors[s.signal_type]||'var(--accent)';
      html += `<div class="sig-row">
        <div class="sig-dot" style="background:${col}"></div>
        <div class="sig-info"><div class="sig-text">${s.notes||s.signal_type?.replace(/_/g,' ')}</div><div class="sig-meta">${s.source} &middot; ${(s.signal_date||'').substring(0,10)} &middot; value: ${s.value?.toFixed(2)||'0'}</div></div>
        <div class="sig-badge" style="background:${col}15;color:${col}">${s.signal_type?.replace(/_/g,' ')}</div>
      </div>`;
    });
    html += '</div>';
    if (!data || data.length === 0) html = '<div class="empty">No signals ingested yet.</div>';
    $('#sec-signals').innerHTML = html;
  } catch(e) { $('#sec-signals').innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`; }
}

// ═══════════════════════════════════════════════════
// IPO TRACKER
// ═══════════════════════════════════════════════════
async function loadIPO() {
  try {
    const data = await api('/api/v1/ipo-candidates?min_score=0.1&limit=30');
    let html = '';
    if (!data || data.length === 0) {
      html = '<div class="empty">No IPO candidates scored yet. Data needs 24-48hrs of ingestion.</div>';
    } else {
      html = '<div class="card" style="overflow-x:auto"><table class="table"><thead><tr><th>Company</th><th>Score</th><th>Stage</th><th>Source</th><th>Date</th></tr></thead><tbody>';
      data.forEach(c => {
        const rd = c.raw_data?.ipo_proximity || {};
        const scr = rd.total || c.value || 0;
        const stage = rd.stage_estimate || '\u2014';
        const col = scr > 0.7 ? 'var(--green)' : scr > 0.4 ? 'var(--yellow)' : 'var(--text2)';
        html += `<tr>
          <td class="name">${rd.name || c.notes || c.entity_id?.substring(0,12) || '\u2014'}</td>
          <td class="mono" style="font-weight:700;color:${col}">${(scr*100).toFixed(0)}%</td>
          <td class="mono" style="font-size:11px">${stage.replace(/_/g,' ')}</td>
          <td class="mono" style="font-size:11px;color:var(--text2)">${c.source||''}</td>
          <td class="mono" style="font-size:11px;color:var(--text3)">${(c.signal_date||'').substring(0,10)}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
    }
    $('#sec-ipo').innerHTML = html;
  } catch(e) { $('#sec-ipo').innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`; }
}

loadOverview();
setInterval(loadOverview, 120000);
</script>
