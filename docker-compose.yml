version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: alpha_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: {context: ., dockerfile: Dockerfile.api}
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/alpha_engine
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ingest-edgar:
    build: {context: ., dockerfile: Dockerfile.edgar}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/alpha_engine
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  ingest-patents:
    build: {context: ., dockerfile: Dockerfile.patents}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/alpha_engine
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}

  ingest-github:
    build: {context: ., dockerfile: Dockerfile.github}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/alpha_engine
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  entity-resolver:
    build: {context: ., dockerfile: Dockerfile.resolver}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/alpha_engine
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

volumes:
  postgres_data:
  redis_data:
