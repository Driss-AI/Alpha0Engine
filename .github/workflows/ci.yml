name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check services/ shared/
      - run: mypy services/ shared/ --ignore-missing-imports --no-strict-optional

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: alpha_engine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r services/api/requirements.txt pytest pytest-asyncio httpx
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/alpha_engine_test
          REDIS_URL: redis://localhost:6379/0
          API_SECRET_KEY: test-secret
          ENVIRONMENT: test
        run: pytest services/api/tests/ -v --tb=short

  test-edgar:
    name: Test EDGAR Parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r services/ingest-edgar/requirements.txt pytest
      - run: pytest services/ingest-edgar/tests/ -v --tb=short
