[mypy]
ignore_missing_imports = True
no_strict_optional = True
namespace_packages = True
explicit_package_bases = True

# Service directories use hyphens (e.g. ingest-13f, screener-1000x) which are
# not valid Python package names. Exclude any hyphenated service dir from
# discovery to avoid "X is not a valid Python package name" crashes.
exclude = services/[^/]*-[^/]*

# This codebase is SQLModel/SQLAlchemy-heavy with an untyped Anthropic SDK.
# Those produce a large volume of false positives (column descriptors,
# session factories, SDK content-block unions). We suppress those specific
# codes so mypy runs as an advisory check — it still catches real problems
# like undefined names, syntax errors, and bad imports.
disable_error_code = attr-defined, union-attr, arg-type, operator, call-overload, index, misc, dict-item, assignment, var-annotated, return-value, has-type, valid-type
